<!DOCTYPE html>
<html lang="de" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' veil:; style-src 'self' 'unsafe-inline'; img-src 'self' data: veil: https:;"
    />
    <title>Veil</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-canvas">
    <div class="h-screen w-screen flex flex-col select-none">
      <!-- ================= TOOLBAR ================= -->
      <header id="toolbar" class="shrink-0">
        <!-- Tab strip (draggable window region) -->
        <div id="tabstrip" class="drag flex items-end gap-1.5 h-10 px-2 pt-1.5" style="padding-right: 145px">
          <div id="tabs" class="drag flex items-end gap-1.5 flex-1 overflow-x-auto"></div>
          <button id="newTab" title="Neuer Tab (Strg+T)"
            class="no-drag icon-btn shrink-0 mb-0.5">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>

        <!-- Navigation bar (draggable; interactive children opt out via no-drag) -->
        <div id="navbar" class="drag flex items-center gap-2 h-12 px-3">
          <div class="no-drag flex items-center gap-1">
            <button id="back" class="icon-btn" title="Zurück (Alt+←)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <button id="forward" class="icon-btn" title="Vor (Alt+→)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
            </button>
            <button id="reload" class="icon-btn" title="Neu laden (Strg+R)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            </button>
          </div>

          <!-- Omnibox -->
          <div id="omnibox" class="no-drag accent-ring glass glass-hover flex items-center gap-2 flex-1 h-9 rounded-xl px-3 mx-1 max-w-3xl mx-auto">
            <span id="secIcon" class="text-[#5b6473] shrink-0" title="Sicher"></span>
            <input id="address" type="text" spellcheck="false" autocomplete="off"
              placeholder="Suchen oder Adresse eingeben"
              class="flex-1 bg-transparent outline-none text-sm text-[#e7e9ef] placeholder:text-[#6b7280]" />
            <span id="torBadge" class="hidden shrink-0 text-[10px] font-semibold tracking-wide px-1.5 py-0.5 rounded-md"
              style="background: rgba(124,108,255,0.16); color: #b8aeff">TOR</span>
            <button id="starBtn" class="shrink-0 grid place-items-center h-6 w-6 rounded-md hover:bg-white/10 text-[#8b93a3]" title="Lesezeichen (Strg+D)">
              <svg id="starIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.9 6.3 6.6.7-4.9 4.5 1.4 6.5L12 18.6 6 21.5l1.4-6.5L2.5 10l6.6-.7z"/></svg>
            </button>
          </div>


          <!-- Shields -->
          <button id="shieldBtn" class="no-drag glass glass-hover flex items-center gap-1.5 h-9 px-2.5 rounded-lg" title="Shields">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span id="shieldCount" class="text-xs font-semibold tabular-nums">0</span>
          </button>

          <button id="downloadBtn" class="icon-btn relative" title="Downloads (Strg+J)">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>
            <span id="dlBadge" class="hidden absolute -top-0.5 -right-0.5 h-2 w-2 rounded-full" style="background:var(--veil-accent)"></span>
          </button>

          <button id="menuBtn" class="icon-btn" title="Menü">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
        </div>

        <!-- Bookmarks bar (shown only when there are bookmarks) -->
        <div id="bookmarksBar" class="no-drag hidden items-center gap-1 h-8 px-2 overflow-x-auto border-t border-white/5"></div>
      </header>

      <!-- ================= BODY ================= -->
      <div class="flex-1 flex min-h-0">
        <!-- Sidebar -->
        <aside id="sidebar" class="shrink-0 flex flex-col items-center gap-2 py-3 transition-[width] duration-200"
          style="width: 56px">
          <button id="sideNewTab" class="icon-btn" title="Neuer Tab"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
          <button id="sideHome" class="icon-btn" title="Startseite"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg></button>
          <div class="flex-1"></div>
          <button id="sideSettings" class="icon-btn" title="Einstellungen"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.2.61.79 1 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
          <button id="sideCollapse" class="icon-btn" title="Seitenleiste ein-/ausklappen"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16"/></svg></button>
        </aside>

        <!-- Web content region: transparent; the native tab view is composited here -->
        <main id="content" class="flex-1 min-w-0"></main>
      </div>

    </div>

    <script src="chrome.js"></script>
  </body>
</html>
