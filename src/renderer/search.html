<!DOCTYPE html>
<html lang="de" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' veil:; style-src 'self' 'unsafe-inline'; img-src 'self' data: veil: https:;"
    />
    <title>Veil Suche</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body { overflow-y: auto; }
      .search-header { background: rgba(11, 13, 19, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
      html.theme-light .search-header { background: rgba(238, 240, 245, 0.9); border-bottom-color: rgba(0, 0, 0, 0.08) !important; }
    </style>
  </head>
  <body class="page-canvas min-h-screen">
    <!-- Header: Veil brand + search box -->
    <header class="search-header sticky top-0 z-10 border-b border-white/5">
      <div class="max-w-3xl mx-auto px-6 py-3 flex items-center gap-4">
        <a href="veil://newtab" class="flex items-center gap-2 shrink-0 no-underline">
          <img src="icon.svg" alt="Veil" width="26" height="26" class="rounded-lg" />
          <span class="text-base font-semibold tracking-tight text-[#e7e9ef]">Veil</span>
        </a>
        <div class="accent-ring glass glass-hover flex items-center gap-2 flex-1 max-w-xl h-10 rounded-xl px-4">
          <svg class="text-[#6b7280] shrink-0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="q" type="text" spellcheck="false" autocomplete="off"
            class="flex-1 bg-transparent outline-none text-sm placeholder:text-[#6b7280]"
            placeholder="Privat suchen mit Veil…" />
        </div>
      </div>
      <!-- Category tabs -->
      <div class="max-w-3xl mx-auto px-6">
        <nav id="tabs" class="flex items-center gap-1 -mb-px"></nav>
      </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 py-6">
      <div id="meta" class="text-xs text-[#6b7280] mb-4"></div>
      <div id="results"></div>
      <div id="empty" class="hidden text-center text-sm text-[#7b8291] py-16"></div>
    </main>

    <script src="search.js"></script>
  </body>
</html>
